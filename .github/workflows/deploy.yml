name: CI/CD Pipeline AWS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY_BACKEND: backend-repo           
  ECR_REPOSITORY_PAGOS: pagos-repo
  ECR_REPOSITORY_NOTIFICACIONES: notificaciones-repo
  ECR_REPOSITORY_AUDITORIA: auditoria-repo
  ECS_CLUSTER: ecommerce-cluster
  ECS_SERVICE_BACKEND: backend-service-alb                 
  ECS_SERVICE_PAGOS: pagos-service                 
  ECS_SERVICE_AUDITORIA: auditoria-service                 
  ECS_TASK_DEFINITION_BACKEND: .aws/backend-task-def.json
  ECS_TASK_DEFINITION_PAGOS: .aws/pagos-task-def.json
  ECS_TASK_DEFINITION_AUDITORIA: .aws/auditoria-task-def.json
  CONTAINER_NAME_BACKEND: backend
  CONTAINER_NAME_PAGOS: pagos
  CONTAINER_NAME_AUDITORIA: auditoria
  S3_FRONTEND_BUCKET: ${{ secrets.S3_FRONTEND_BUCKET }}

jobs:
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    # ==========================================
    # 1. FRONTEND -> Amazon S3 (Static Website)
    # ==========================================
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Install dependencies and Build Angular
      run: |
        cd frontend
        npm install
        npm run build

    - name: Deploy Frontend to S3 and Backend
      run: |
        aws s3 sync frontend/dist/frontend/browser/ s3://${{ env.S3_FRONTEND_BUCKET }} --delete
        mkdir -p backend/static
        cp -r frontend/dist/frontend/browser/* backend/static/

    # ==========================================
    # 2. BACKEND & PAGOS -> Amazon ECS (Fargate)
    # ==========================================
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build, tag, and push Backend to ECR
      id: build-image-backend
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:$IMAGE_TAG ./backend
        docker push $ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:$IMAGE_TAG
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Build, tag, and push Pagos to ECR
      id: build-image-pagos
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_PAGOS:$IMAGE_TAG ./pagos
        docker push $ECR_REGISTRY/$ECR_REPOSITORY_PAGOS:$IMAGE_TAG
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY_PAGOS:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Build, tag, and push Auditoria to ECR
      id: build-image-auditoria
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_AUDITORIA:$IMAGE_TAG ./auditoria
        docker push $ECR_REGISTRY/$ECR_REPOSITORY_AUDITORIA:$IMAGE_TAG
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY_AUDITORIA:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Fill ECS task definition (Backend)
      id: task-def-backend
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: ${{ env.ECS_TASK_DEFINITION_BACKEND }}
        container-name: ${{ env.CONTAINER_NAME_BACKEND }}
        image: ${{ steps.build-image-backend.outputs.image }}
        environment-variables: |
          AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}

    - name: Deploy ECS task definition (Backend)
      uses: aws-actions/amazon-ecs-deploy-task-definition@v1
      with:
        task-definition: ${{ steps.task-def-backend.outputs.task-definition }}
        service: ${{ env.ECS_SERVICE_BACKEND }}
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: true

    - name: Fill ECS task definition (Auditoria)
      id: task-def-auditoria
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: ${{ env.ECS_TASK_DEFINITION_AUDITORIA }}
        container-name: ${{ env.CONTAINER_NAME_AUDITORIA }}
        image: ${{ steps.build-image-auditoria.outputs.image }}

    - name: Deploy ECS task definition (Auditoria)
      uses: aws-actions/amazon-ecs-deploy-task-definition@v1
      with:
        task-definition: ${{ steps.task-def-auditoria.outputs.task-definition }}
        service: ${{ env.ECS_SERVICE_AUDITORIA }}
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: true

    # - name: Fill ECS task definition (Pagos)
    #   id: task-def-pagos
    #   uses: aws-actions/amazon-ecs-render-task-definition@v1
    #   with:
    #     task-definition: ${{ env.ECS_TASK_DEFINITION_PAGOS }}
    #     container-name: ${{ env.CONTAINER_NAME_PAGOS }}
    #     image: ${{ steps.build-image-pagos.outputs.image }}

    # - name: Deploy ECS task definition (Pagos)
    #   uses: aws-actions/amazon-ecs-deploy-task-definition@v1
    #   with:
    #     task-definition: ${{ steps.task-def-pagos.outputs.task-definition }}
    #     service: ${{ env.ECS_SERVICE_PAGOS }}
    #     cluster: ${{ env.ECS_CLUSTER }}
    #     wait-for-service-stability: true

    # ==========================================
    # 3. NOTIFICACIONES -> Amazon EC2 (Docker)
    # ==========================================
    - name: Build, tag, and push Notificaciones to ECR
      id: build-image-notificaciones
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_NOTIFICACIONES:$IMAGE_TAG ./notificaciones
        docker push $ECR_REGISTRY/$ECR_REPOSITORY_NOTIFICACIONES:$IMAGE_TAG
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY_NOTIFICACIONES:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Deploy Notificaciones to EC2 via SSH
      uses: appleboy/ssh-action@v1.0.0
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_REGION: ${{ env.AWS_REGION }}
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        envs: AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,AWS_REGION
        script: |
          export AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID
          export AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY
          export AWS_DEFAULT_REGION=$AWS_REGION
          aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}
          docker pull ${{ steps.build-image-notificaciones.outputs.image }}
          docker stop notificaciones-service || true
          docker rm notificaciones-service || true
          docker run -d --name notificaciones-service --env-file /home/${{ secrets.EC2_USERNAME }}/.env -p 8003:8003 ${{ steps.build-image-notificaciones.outputs.image }}

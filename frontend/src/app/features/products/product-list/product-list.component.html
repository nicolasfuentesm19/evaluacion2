<div class="container">
  <h2 style="margin: 2rem 0;">Catálogo de Productos</h2>

  <div class="product-grid" *ngIf="products$ | async as products">
    <div class="product-card glass-panel" *ngFor="let product of products">
      <div class="image-container">
        <img [src]="product.image_url" [alt]="product.title">
      </div>
      <div class="product-info">
        <h3>{{ product.title }}</h3>
        <p class="description">{{ product.description }}</p>
        <div class="price-action">
          <span class="price">${{ product.price | number:'1.2-2' }}</span>
          <button class="btn btn-primary btn-sm" (click)="addToCart(product)">
            Añadir
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

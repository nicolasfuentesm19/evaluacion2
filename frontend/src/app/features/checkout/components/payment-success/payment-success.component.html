<div class="container py-5 mt-5">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      <div class="card shadow-sm border-0 rounded-4 p-4 text-center">
        
        <div *ngIf="status === 'processing'" class="py-4">
          <div class="spinner-border text-primary mb-3" role="status" style="width: 3rem; height: 3rem;">
            <span class="visually-hidden">Procesando...</span>
          </div>
          <h4>Confirmando tu pago</h4>
          <p class="text-muted">{{ message }}</p>
        </div>

        <div *ngIf="status === 'success'" class="py-4">
          <div class="mb-3">
            <i class="bi bi-check-circle-fill text-success" style="font-size: 4rem;"></i>
          </div>
          <h2 class="text-success mb-3">¡Pago Exitoso!</h2>
          <p class="lead">{{ message }}</p>
          <div class="alert alert-light mt-4 text-start border">
            <strong>ID de Transacción:</strong> {{ collectionId }}<br>
            <strong>Estado:</strong> Aprobado
          </div>
          <div class="mt-4">
            <a routerLink="/" class="btn btn-primary px-4 py-2 rounded-pill">Volver al Inicio</a>
          </div>
        </div>

        <div *ngIf="status === 'error'" class="py-4">
          <div class="mb-3">
            <i class="bi bi-x-circle-fill text-danger" style="font-size: 4rem;"></i>
          </div>
          <h2 class="text-danger mb-3">Problema con el pago</h2>
          <p class="lead">{{ message }}</p>
          <div class="mt-4">
            <a routerLink="/cart" class="btn btn-outline-secondary px-4 py-2 rounded-pill">Volver al Carrito</a>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<div class="auditoria-container">
  <h2>Dashboard de Auditoría y Monitoreo</h2>
  <button (click)="loadEvents()" class="refresh-btn">Actualizar Eventos</button>

  <div *ngIf="loading" class="loading">Cargando eventos...</div>
  <div *ngIf="error" class="error">{{ error }}</div>

  <table *ngIf="!loading && events.length > 0" class="audit-table">
    <thead>
      <tr>
        <th>ID</th>
        <th>Fecha y Hora</th>
        <th>Usuario</th>
        <th>Tipo de Evento</th>
        <th>Descripción</th>
        <th>IP</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let event of events">
        <td>{{ event.id }}</td>
        <td>{{ event.timestamp }}</td>
        <td>{{ event.user_email }}</td>
        <td><span class="badge {{ event.event_type | lowercase }}">{{ event.event_type }}</span></td>
        <td>{{ event.description }}</td>
        <td>{{ event.ip_address || 'N/A' }}</td>
      </tr>
    </tbody>
  </table>

  <div *ngIf="!loading && events.length === 0" class="empty-state">
    No hay eventos registrados.
  </div>
</div>

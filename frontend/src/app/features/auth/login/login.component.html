<div class="container auth-container">
  <div class="glass-panel">
    <h2 style="margin-bottom: 1.5rem; text-align: center;">Iniciar Sesión</h2>
    
    <div *ngIf="error" class="error-msg">{{ error }}</div>

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Email</label>
        <input type="email" class="form-control" [(ngModel)]="email" name="email" required>
      </div>
      
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" class="form-control" [(ngModel)]="password" name="password" required>
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%;">Ingresar</button>
      
      <p style="margin-top: 1.5rem; text-align: center; font-size: 0.9rem; color: var(--text-secondary);">
        ¿No tienes cuenta? <a routerLink="/register">Regístrate aquí</a>
      </p>
    </form>
  </div>
</div>
